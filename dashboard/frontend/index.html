<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta name="description" content="Dashboard moderno para gerenciamento de bot Discord." />
    <title>Steve Wonder Dashboard</title>
    <style>
      html,
      body,
      #root {
        min-height: 100%;
        margin: 0;
        background: #000000;
        color: #ffffff;
      }

      .boot-fallback {
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #000000;
        color: #a1a1aa;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <main class="login-shell boot-fallback">
        <section class="login-panel fade-in">
          <p class="eyebrow">Acesso restrito</p>
          <h1>Steve Wonder Dashboard</h1>
          <p>Carregando dashboard...</p>
          <a class="login-button login-primary" href="/api/auth/discord">Entrar com Discord</a>
          <noscript>Ative o JavaScript para acessar o painel.</noscript>
        </section>
      </main>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
