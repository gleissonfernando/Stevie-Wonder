<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta name="description" content="Painel black para configurar alertas de live no Discord." />
    <title>Live Alerts Dashboard</title>
    <style>
      html,
      body,
      #root {
        min-height: 100%;
        margin: 0;
        background: #030303;
        color: #f5f5f5;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .login-screen {
        display: grid;
        min-height: 100vh;
        place-items: center;
        padding: 24px;
      }

      .login-panel {
        width: min(100%, 460px);
        padding: 34px;
        border: 1px solid #262626;
        border-radius: 8px;
        background: #0d0d0d;
        text-align: center;
      }

      .logo-mark {
        display: grid;
        width: 68px;
        height: 68px;
        place-items: center;
        margin: 0 auto 18px;
        border-radius: 8px;
        background: #f5f5f5;
        color: #050505;
        font-size: 30px;
        font-weight: 900;
      }

      .eyebrow {
        margin: 0;
        color: #a3a3a3;
        font-size: 11px;
        font-weight: 800;
        text-transform: uppercase;
      }

      .login-panel h1 {
        margin: 10px 0 0;
        color: #ffffff;
        font-size: 34px;
        line-height: 1.08;
      }

      .login-copy {
        margin: 14px 0 24px;
        color: #c7c7c7;
        line-height: 1.65;
      }

      .discord-button {
        display: inline-flex;
        min-height: 42px;
        align-items: center;
        justify-content: center;
        padding: 0 15px;
        border: 1px solid #f5f5f5;
        border-radius: 8px;
        background: #f5f5f5;
        color: #050505;
        font-weight: 800;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <main class="login-screen">
        <section class="login-panel">
          <div class="logo-mark">S</div>
          <p class="eyebrow">Steve Wonder</p>
          <h1>Dashboard do Discord</h1>
          <p class="login-copy">Entre com sua conta Discord para abrir o painel e gerenciar os servidores liberados.</p>
          <a class="discord-button" href="/api/auth/discord">Entrar com Discord</a>
          <noscript>Ative o JavaScript para acessar o dashboard completo.</noscript>
        </section>
      </main>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
