<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta name="description" content="Dashboard moderno para gerenciamento de bot Discord." />
    <title>Steve Wonder Dashboard</title>
    <style>
      html,
      body,
      #root {
        min-height: 100%;
        margin: 0;
        background: #000000;
        color: #ffffff;
      }

      .boot-fallback {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #000000;
        color: #f8fafc;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        text-align: center;
        padding: 24px;
      }

      .boot-fallback > div {
        width: min(420px, 100%);
        border: 1px solid rgba(255, 255, 255, 0.14);
        background: rgba(18, 18, 22, 0.92);
        padding: 28px;
        border-radius: 8px;
      }

      .boot-fallback p {
        margin: 0 0 18px;
        color: #a1a1aa;
      }

      .boot-fallback a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 44px;
        padding: 0 18px;
        border-radius: 8px;
        background: #5865f2;
        color: #ffffff;
        font-weight: 700;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="boot-fallback">
        <div>
          <p>Carregando dashboard...</p>
          <a href="/api/auth/discord">Entrar com Discord</a>
          <noscript>Ative o JavaScript para acessar o painel.</noscript>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
